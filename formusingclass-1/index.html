<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace</title>
</head>
<body>

<div class="container">

    <div class="header">
        <p> GET STARTED</p>
        <h1>Create your workspace</h1>
    </div>

    <form>

        <div class="form">
            <label for="fullname">Full name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Jane Doe" required>
        </div>

        <div class="form">
            <label for="phone">Phone number</label>
            <input type="number" id="phone" name="phone" placeholder="5551234567" required>
        </div>

        <div class="form">
            <label for="dob">Date of birth</label>
            <input type="date" id="dob" name="dob" required>
        </div>

        <div class="form">
            <label for="email">Work email</label>
            <input type="email" id="email" name="email" placeholder="jane@company.com" required>
        </div>

        <div class="form">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="At least 8 characters" required>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="updates" name="updates" checked>
            <label for="updates">Email me product updates and tips</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">I agree to the Terms & Privacy Policy</label>
        </div>

        <div class="btn-group">
            <input type="submit" value="Create workspace">
            <input type="reset" value="Reset">
        </div>

    </form>

</div>

</body>
</html>
